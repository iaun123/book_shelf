<div id="book-list">กำลังโหลดข้อมูลหนังสือ...</div>

<script>
    // ลิงก์ CSV จาก Google Sheets (แปลงจาก pubhtml เป็น pub?output=csv)
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA35RErZ7gx0C-iy8ZQQnysbSuBOS1HLvSLXUIxOVukp5yckMAGE0hHK8LlA0fWR9PwmpFhaSJM1Vq/pub?output=csv';

    async function fetchBooks() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n');
            let html = '<ul style="text-align: left; list-style: none; padding: 0;">';

            // เริ่มวนลูปที่แถวที่ 2 (index 1) เพื่อข้ามหัวตาราง
            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i].split(',');
                if (columns.length >= 2) {
                    const title = columns[0]; // ชื่อหนังสือ
                    const volume = columns[1]; // จำนวนเล่ม/เล่มที่
                    html += `<li style="margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                                <strong>${title}</strong> - ${volume} เล่ม
                             </li>`;
                }
            }
            html += '</ul>';
            document.getElementById('book-list').innerHTML = html;
        } catch (error) {
            document.getElementById('book-list').innerHTML = 'ไม่สามารถโหลดข้อมูลได้ในขณะนี้';
        }
    }

    fetchBooks();
</script>
