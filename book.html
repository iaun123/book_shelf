<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Engineering Project</title>
    <style>
        /* CSS สำหรับตกแต่งหน้าเว็บ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        .status-badge {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 25px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Website Online</div>
        <h1>โครงการวิศวกรรมของฉัน</h1>
        <p>ยินดีต้อนรับสู่หน้าเว็บแรกที่เขียนด้วยโค้ดเอง! หน้านี้สามารถใช้แสดงผลข้อมูลจากโปรเจกต์ระบบควบคุม หรือผลงานด้านหุ่นยนต์ (Robotics) ได้ในอนาคต</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <p><strong>ทักษะที่ใช้:</strong> HTML, CSS, JavaScript</p>
        
        <a href="#" class="btn" onclick="alert('ยินดีด้วย! ระบบตอบสนองแล้ว')">ทดสอบปุ่มกด</a>
    </div>

</body>
</html>
