<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Shelf - Local Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 my book shelf (Offline)</h1>
        
        <div class="filter-container">
            <button onclick="filterBooks('all')">All</button>
            <button onclick="filterBooks('Comic')">Comic</button>
            <button onclick="filterBooks('Novel')">Novel</button>
            <button onclick="filterBooks('EBook')">E-Book</button>
        </div>

        <div id="book-list">loading...</div>

        <hr>

        <div class="admin-panel">
            <h3>📝 add new book</h3>
            <input type="text" id="new-title" placeholder="ชื่อหนังสือ">
            <input type="text" id="new-volume" placeholder="จำนวนเล่ม/เล่มที่">
            <select id="new-category">
                <option value="Comic">Comic</option>
                <option value="Novel">Novel</option>
                <option value="EBook">E-Book</option>
            </select>
            <button onclick="addBook()">➕ add to shelf</button>
        </div>
    </div>

    <script>
        // ดึงข้อมูลจากความจำเครื่อง (LocalStorage)
        let allBooks = JSON.parse(localStorage.getItem('myBooks')) || [];

        function displayBooks(books) {
            let html = '<ul>';
            if (books.length === 0) {
                html += '<p style="text-align:center; color:#999;">ยังไม่มีหนังสือในชั้นนี้</p>';
            } else {
                books.forEach((book, index) => {
                    html += `
                        <li class="book-item" style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div class="book-title">${book.title}</div>
                                <div class="book-detail">หมวด: ${book.category} | จำนวน: ${book.volume}</div>
                            </div>
                            <button onclick="deleteBook(${index})" style="background:none; border:none; color:red; cursor:pointer;">ลบ</button>
                        </li>`;
                });
            }
            html += '</ul>';
            document.getElementById('book-list').innerHTML = html;
        }

        function addBook() {
            const title = document.getElementById('new-title').value;
            const volume = document.getElementById('new-volume').value;
            const category = document.getElementById('new-category').value;

            if (!title) return alert("ใส่ชื่อหนังสือด้วยครับ");

            // เพิ่มข้อมูลลงใน Array
            allBooks.push({ title, volume, category });

            // เซฟลงความจำเครื่อง
            localStorage.setItem('myBooks', JSON.stringify(allBooks));

            // ล้างฟอร์มและแสดงผลใหม่
            document.getElementById('new-title').value = '';
            document.getElementById('new-volume').value = '';
            displayBooks(allBooks);
        }

        function deleteBook(index) {
            if (confirm("ยืนยันการลบหนังสือเล่มนี้?")) {
                allBooks.splice(index, 1);
                localStorage.setItem('myBooks', JSON.stringify(allBooks));
                displayBooks(allBooks);
            }
        }

        function filterBooks(cat) {
            if (cat === 'all') displayBooks(allBooks);
            else displayBooks(allBooks.filter(book => book.category === cat));
        }

        // แสดงผลทันทีที่เปิดหน้าเว็บ
        displayBooks(allBooks);
    </script>
</body>
</html>
