<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Shelf - IAUN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 my book shelf</h1>
        
        <div class="filter-container">
            <button onclick="filterBooks('all')">All</button>
            <button onclick="filterBooks('Comic')">Comic</button>
            <button onclick="filterBooks('Novel')">Novel</button>
            <button onclick="filterBooks('EBook')">E-Book</button>
        </div>

        <div id="book-list">loading...</div>

        <hr>

        <div class="admin-panel">
            <h3>📝 add new book</h3>
            <input type="text" id="new-title" placeholder="ชื่อหนังสือ">
            <input type="text" id="new-volume" placeholder="จำนวนเล่ม/เล่มที่">
            <select id="new-category">
                <option value="Comic">Comic</option>
                <option value="Novel">Novel</option>
                <option value="EBook">E-Book</option>
            </select>
            <button onclick="addBook()" id="btn-add">➕ add to shelf</button>
        </div>
    </div>

    <script>
        const sources = {
            Comic: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA35RErZ7gx0C-iy8ZQQnysbSuBOS1HLvSLXUIxOVukp5yckMAGE0hHK8LlA0fWR9PwmpFhaSJM1Vq/pub?gid=1728116497&output=csv',
            Novel: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA35RErZ7gx0C-iy8ZQQnysbSuBOS1HLvSLXUIxOVukp5yckMAGE0hHK8LlA0fWR9PwmpFhaSJM1Vq/pub?gid=248383286&output=csv',
            EBook: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA35RErZ7gx0C-iy8ZQQnysbSuBOS1HLvSLXUIxOVukp5yckMAGE0hHK8LlA0fWR9PwmpFhaSJM1Vq/pub?gid=1497914856&output=csv'
        };

        const scriptUrl = 'https://script.google.com/macros/s/AKfycbz7NA9yYxHmL_ahXr8HFsC5Ed75BnuCoJcdixzK8kSZ8LSZ_kow8I2_ZXTHs6Iqh5yU/exec';
        let allBooks = [];

        async function fetchBooks() {
            try {
                allBooks = [];
                const fetchPromises = Object.entries(sources).map(async ([category, url]) => {
                    const response = await fetch(url);
                    const data = await response.text();
                    const rows = data.split('\n');
                    for (let i = 1; i < rows.length; i++) {
                        const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        if (columns.length >= 2) {
                            const title = columns[0].replace(/^"|"$/g, '').trim();
                            const volume = columns[1] ? columns[1].replace(/^"|"$/g, '').trim() : "";
                            if (title) allBooks.push({ title, volume, category });
                        }
                    }
                });
                await Promise.all(fetchPromises);
                displayBooks(allBooks);
            } catch (error) {
                document.getElementById('book-list').innerHTML = '❌ ไม่สามารถโหลดข้อมูลได้';
            }
        }

        function displayBooks(books) {
            let html = '<ul>';
            books.forEach(book => {
                html += `
                    <li class="book-item">
                        <div class="book-title">${book.title}</div>
                        <div class="book-detail">หมวด: ${book.category} | จำนวน: ${book.volume}</div>
                    </li>`;
            });
            html += '</ul>';
            document.getElementById('book-list').innerHTML = html;
        }

        function filterBooks(cat) {
            if (cat === 'all') displayBooks(allBooks);
            else displayBooks(allBooks.filter(book => book.category === cat));
        }

        async function addBook() {
            const title = document.getElementById('new-title').value;
            const volume = document.getElementById('new-volume').value;
            const category = document.getElementById('new-category').value;
            const btn = document.getElementById('btn-add');

            if (!title) return alert("ใส่ชื่อหนังสือด้วยครับ");

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', title, volume, category })
                });
                alert("ส่งข้อมูลแล้ว! รออัปเดตสักครู่ครับ");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาด");
            } finally {
                btn.disabled = false;
                btn.innerText = "➕ add to shelf";
            }
        }

        fetchBooks();
    </script>
</body>
</html>
