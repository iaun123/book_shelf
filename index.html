<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shelf | Chananya</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="login-overlay" class="auth-overlay">
        <div class="login-card">
            <h2 style="color: #1a73e8; margin-bottom: 20px;">🔐 Private Access</h2>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="login-btn">Sign In to Library</button>
            <p style="font-size: 0.7rem; color: #999; margin-top: 15px;">Authorized Personnel Only</p>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="top-nav">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search series title...">
            </div>
            <div class="user-controls">
                <span id="display-user" style="font-size: 0.85rem; color: #666; margin-right: 15px;"></span>
                <button id="logout-btn" style="background: none; border: 1px solid #ddd; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">Logout</button>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="sidebar">
                <h2>MENU</h2>
                <button id="nav-all">🏠 All Series</button>
                <button id="nav-comic">📖 Comic</button>
                <button id="nav-novel">📕 Novel</button>
                <button id="nav-ebook">📱 E-Book</button>
                
                <hr class="divider">
                
                <div class="admin-panel">
                    <h3>➕ Add New Book</h3>
                    <label style="font-size: 0.75rem; color: #666;">Series Name</label>
                    <input type="text" id="new-title" placeholder="e.g. One Piece">
                    
                    <label style="font-size: 0.75rem; color: #666;">Volume Number</label>
                    <input type="text" id="new-vol" placeholder="e.g. 101">
                    
                    <label style="font-size: 0.75rem; color: #666;">Category</label>
                    <select id="new-category">
                        <option value="Comic">Comic</option>
                        <option value="Novel">Novel</option>
                        <option value="EBook">E-Book</option>
                    </select>
                    
                    <button id="save-btn">Save to Cloud</button>
                </div>
            </div>

            <div class="content">
                <button id="back-btn" class="back-link">⬅ Back to List</button>
                
                <div id="book-list">
                    <div style="text-align: center; padding: 50px; color: #999;">
                        📡 Connecting to database...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
