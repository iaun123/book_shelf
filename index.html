<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Shelf | Chananya</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="login-overlay" class="auth-overlay">
        <div class="login-card">
            <h2>🔐 Private Access</h2>
            <p>Please login to your book shelf</p>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="top-nav">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search titles...">
                <div id="search-result" class="search-status"></div>
            </div>
            <div class="user-controls">
                <span id="display-user"></span>
                <button id="logout-btn" class="logout-btn-top">Logout</button>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="sidebar">
                <h2>MENU</h2>
                <button id="nav-all">🏠 All Series</button>
                <button id="nav-comic">📖 Comic</button>
                <button id="nav-novel">📕 Novel</button>
                <button id="nav-ebook">📱 E-Book</button>
                
                <hr class="divider">
                
                <div class="admin-panel">
                    <h3>➕ Add New Book</h3>
                    <input type="text" id="new-title" placeholder="Series Title">
                    <input type="text" id="new-vol" placeholder="Volume #">
                    <select id="new-category">
                        <option value="Comic">Comic</option>
                        <option value="Novel">Novel</option>
                        <option value="EBook">E-Book</option>
                    </select>
                    <select id="new-status">
                        <option value="null">Reading (Ongoing)</option>
                        <option value="end">Completed (End)</option>
                    </select>
                    <button id="save-btn">Save to Cloud</button>
                </div>
            </div>

            <div class="content">
                <div id="back-btn" class="back-link">⬅ Back to List</div>
                <div id="list-title"><h3>Your Collection</h3></div>
                <div id="book-list">Loading...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
