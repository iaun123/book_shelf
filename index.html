<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shelf Pro - IAUN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-nav">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 ค้นหาชื่อเรื่องเพื่อเช็คเล่มที่มี..." oninput="searchBook()">
            <div id="search-result" class="search-status"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="sidebar">
            <h2>MENU</h2>
            <button onclick="showAllSeries()">🏠 All Series</button>
            <button onclick="filterBooks('Comic')">📖 Comic</button>
            <button onclick="filterBooks('Novel')">📕 Novel</button>
            <button onclick="filterBooks('EBook')">📱 E-Book</button>
            
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
            
            <button onclick="exportToCSV()" class="export-btn">📤 Export CSV</button>
            
            <label for="import-csv" class="custom-file-upload">📥 Import CSV</label>
            <input type="file" id="import-csv" accept=".csv" onchange="importFromCSV(event)" style="display:none;">
            
            <div class="admin-panel">
                <h3>➕ Add New Book</h3>
                <input type="text" id="new-title" placeholder="ชื่อเรื่อง">
                <input type="text" id="new-vol" placeholder="เล่มที่">
                <select id="new-category">
                    <option value="Comic">Comic</option>
                    <option value="Novel">Novel</option>
                    <option value="EBook">E-Book</option>
                </select>
                <button onclick="addBook()" id="save-btn">Save to Shelf</button>
            </div>
        </div>

        <div class="content">
            <div id="back-btn" class="back-link" onclick="showAllSeries()">⬅ Back to List</div>
            <div id="list-title"><h3>All Series</h3></div>
            <div id="book-list">Loading...</div>
        </div>
    </div>

    <script>
        let myLibrary = JSON.parse(localStorage.getItem('myLibrary')) || [];
        let currentDisplayData = []; // ตัวแปรสำคัญเพื่อแก้บั๊กคลิกแล้วแสดงผิดเรื่อง

        function searchBook() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const resultDiv = document.getElementById('search-result');
            
            if (!query) {
                resultDiv.innerHTML = "";
                return;
            }

            const foundSeries = myLibrary.find(s => s.title.toLowerCase().includes(query));
            
            if (foundSeries) {
                resultDiv.innerHTML = `✅ Found: <b>${foundSeries.title}</b> (มีเล่ม: ${foundSeries.volumes.join(", ")})`;
                resultDiv.style.color = "#27ae60";
            } else {
                resultDiv.innerHTML = `❌ You don't have this book yet.`;
                resultDiv.style.color = "#e74c3c";
            }
        }

        function displayLibrary(data = myLibrary) {
            currentDisplayData = data; // อัปเดตข้อมูลที่โชว์อยู่ปัจจุบัน
            const listDiv = document.getElementById('book-list');
            document.getElementById('back-btn').style.display = 'none';
            let html = '<div class="grid-container">';
            
            if (data.length === 0) {
                html = '<p style="color:#999; text-align:center; width:100%;">ไม่พบข้อมูลหนังสือในหมวดนี้</p>';
            } else {
                data.forEach((series, index) => {
                    html += `
                        <div class="series-card" onclick="showDetail(${index})">
                            <div class="card-title">${series.title}</div>
                            <div class="card-info">${series.category} | ${series.volumes.length} Vols</div>
                        </div>`;
                });
            }
            html += '</div>';
            listDiv.innerHTML = html;
        }

        function showDetail(index) {
            const series = currentDisplayData[index]; // ดึงจากข้อมูลที่กรองอยู่ ไม่ใช่ myLibrary ทั้งหมด
            if (!series) return;

            const listDiv = document.getElementById('book-list');
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('list-title').innerHTML = `<h3>${series.title} Detail</h3>`;

            let html = `<div class="detail-view">
                <p>หมวดหมู่: <b>${series.category}</b></p>
                <div class="vol-grid">`;
            
            const sortedVols = [...series.volumes].sort((a, b) => parseFloat(a) - parseFloat(b));
            
            sortedVols.forEach(v => {
                html += `<span class="vol-tag">เล่มที่ ${v}</span>`;
            });
            
            // ค้นหาตำแหน่งจริงๆ ใน myLibrary เพื่อให้ลบได้ถูกต้อง
            const actualIndex = myLibrary.findIndex(s => s.title === series.title);
            html += `</div>
                <button onclick="deleteSeries(${actualIndex})" class="del-btn">Delete Entire Series</button>
            </div>`;
            listDiv.innerHTML = html;
        }

        function showAllSeries() {
            document.getElementById('list-title').innerHTML = "<h3>All Series</h3>";
            displayLibrary(myLibrary);
        }

        function filterBooks(cat) {
            const titleMap = { 'Comic': 'Comic', 'Novel': 'Novel', 'EBook': 'E-Book' };
            document.getElementById('list-title').innerHTML = `<h3>Category: ${titleMap[cat] || cat}</h3>`;
            const filtered = myLibrary.filter(s => s.category === cat);
            displayLibrary(filtered);
        }

        function addBook() {
            const title = document.getElementById('new-title').value.trim();
            const vol = document.getElementById('new-vol').value.trim();
            const category = document.getElementById('new-category').value;

            if (!title || !vol) return alert("Please fill title and volume");

            let series = myLibrary.find(s => s.title.toLowerCase() === title.toLowerCase());
            if (series) {
                if (!series.volumes.includes(vol)) {
                    series.volumes.push(vol);
                } else {
                    alert("You already have this volume!");
                    return;
                }
            } else {
                myLibrary.push({ title, category, volumes: [vol] });
            }

            localStorage.setItem('myLibrary', JSON.stringify(myLibrary));
            document.getElementById('new-title').value = '';
            document.getElementById('new-vol').value = '';
            showAllSeries();
        }

        function deleteSeries(index) {
            if(confirm("Delete this entire series?")) {
                myLibrary.splice(index, 1);
                localStorage.setItem('myLibrary', JSON.stringify(myLibrary));
                showAllSeries();
            }
        }

        function exportToCSV() {
            let csv = "Title,Category,Volumes\n";
            myLibrary.forEach(s => {
                csv += `"${s.title}","${s.category}","${s.volumes.join('|')}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "my_book_shelf.csv");
            link.click();
        }

        function importFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n');
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 3 || !cols[0].trim()) continue;

                    const title = cols[0].replace(/^"|"$/g, '').trim();
                    const category = cols[1].replace(/^"|"$/g, '').trim();
                    const volumes = cols[2].replace(/^"|"$/g, '').trim().split('|');

                    let existing = myLibrary.find(s => s.title.toLowerCase() === title.toLowerCase());
                    if (existing) {
                        volumes.forEach(v => {
                            if (v && !existing.volumes.includes(v)) existing.volumes.push(v);
                        });
                    } else {
                        myLibrary.push({ title, category, volumes: volumes.filter(v => v !== "") });
                    }
                }
                localStorage.setItem('myLibrary', JSON.stringify(myLibrary));
                alert("Import Success!");
                location.reload();
            };
            reader.readAsText(file);
        }

        displayLibrary();
    </script>
</body>
</html>
