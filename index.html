<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Shelf Cloud - IAUN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="top-nav">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 ค้นหาชื่อเรื่องเพื่อเช็คเล่มที่มี..." oninput="searchBook()">
            <div id="search-result" class="search-status"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="sidebar">
            <h2>MENU</h2>
            <button onclick="fetchAllBooks()">🏠 All Series</button>
            <button onclick="filterBooks('Comic')">📖 Comic</button>
            <button onclick="filterBooks('Novel')">📕 Novel</button>
            <button onclick="filterBooks('EBook')">📱 E-Book</button>
            
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
            
            <div class="admin-panel">
                <h3>➕ Add New Book</h3>
                <input type="text" id="new-title" placeholder="ชื่อเรื่อง">
                <input type="text" id="new-vol" placeholder="เล่มที่">
                <select id="new-category">
                    <option value="Comic">Comic</option>
                    <option value="Novel">Novel</option>
                    <option value="EBook">EBook</option>
                </select>
                <button onclick="addBook()" id="save-btn">Save to Cloud</button>
            </div>
        </div>

        <div class="content">
            <div id="back-btn" class="back-link" onclick="fetchAllBooks()">⬅ Back to List</div>
            <div id="list-title"><h3>All Series (Cloud)</h3></div>
            <div id="book-list">Loading from Supabase...</div>
        </div>
    </div>

    <script>
        // ตั้งค่าการเชื่อมต่อ
        const SUPABASE_URL = 'https://iesaxrdexywsegppjbxo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9Rxgo8i46-CxS5-vRHmIUQ_fiqTQn1T';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myLibrary = [];
        let currentDisplayData = [];

        // ดึงข้อมูลทั้งหมดจาก Supabase
        async function fetchAllBooks() {
            const listDiv = document.getElementById('book-list');
            listDiv.innerHTML = "Fetching data...";

            const { data, error } = await _supabase
                .from('books')
                .select('*')
                .order('title', { ascending: true });

            if (error) {
                console.error('Error:', error);
                listDiv.innerHTML = "Error loading data.";
                return;
            }

            myLibrary = data;
            document.getElementById('list-title').innerHTML = "<h3>All Series (Cloud)</h3>";
            displayLibrary(myLibrary);
        }

        function displayLibrary(data) {
            currentDisplayData = data;
            const listDiv = document.getElementById('book-list');
            document.getElementById('back-btn').style.display = 'none';
            let html = '<div class="grid-container">';
            
            if (data.length === 0) {
                html = '<p style="color:#999; text-align:center; width:100%;">ไม่มีข้อมูลในหมวดนี้</p>';
            } else {
                data.forEach((series, index) => {
                    const volCount = series.volumes ? series.volumes.length : 0;
                    html += `
                        <div class="series-card" onclick="showDetail(${index})">
                            <div class="card-title">${series.title}</div>
                            <div class="card-info">${series.category} | ${volCount} Vols</div>
                        </div>`;
                });
            }
            html += '</div>';
            listDiv.innerHTML = html;
        }

        async function addBook() {
            const titleInput = document.getElementById('new-title');
            const volInput = document.getElementById('new-vol');
            const category = document.getElementById('new-category').value;
            const title = titleInput.value.trim();
            const vol = volInput.value.trim();

            if (!title || !vol) return alert("Please fill all fields");

            // เช็คว่ามีเรื่องนี้อยู่แล้วไหม
            let existing = myLibrary.find(s => s.title.toLowerCase() === title.toLowerCase());

            if (existing) {
                if (!existing.volumes.includes(vol)) {
                    const updatedVols = [...existing.volumes, vol];
                    await _supabase
                        .from('books')
                        .update({ volumes: updatedVols })
                        .eq('id', existing.id);
                } else {
                    alert("Volume already exists!");
                }
            } else {
                await _supabase
                    .from('books')
                    .insert([{ title, category, volumes: [vol] }]);
            }

            titleInput.value = '';
            volInput.value = '';
            fetchAllBooks();
        }

        function showDetail(index) {
            const series = currentDisplayData[index];
            if (!series) return;

            const listDiv = document.getElementById('book-list');
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('list-title').innerHTML = `<h3>${series.title} Detail</h3>`;

            let html = `<div class="detail-view">
                <p>Category: <b>${series.category}</b></p>
                <div class="vol-grid">`;
            
            const sortedVols = [...series.volumes].sort((a, b) => parseFloat(a) - parseFloat(b));
            sortedVols.forEach(v => {
                html += `<span class="vol-tag">เล่มที่ ${v}</span>`;
            });
            
            html += `</div>
                <button onclick="deleteSeries(${series.id})" class="del-btn">Delete Entire Series</button>
            </div>`;
            listDiv.innerHTML = html;
        }

        async function deleteSeries(id) {
            if(confirm("Are you sure you want to delete this series from Cloud?")) {
                await _supabase.from('books').delete().eq('id', id);
                fetchAllBooks();
            }
        }

        function filterBooks(cat) {
            document.getElementById('list-title').innerHTML = `<h3>Category: ${cat}</h3>`;
            const filtered = myLibrary.filter(s => s.category === cat);
            displayLibrary(filtered);
        }

        function searchBook() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const resultDiv = document.getElementById('search-result');
            if (!query) { resultDiv.innerHTML = ""; return; }

            const found = myLibrary.find(s => s.title.toLowerCase().includes(query));
            if (found) {
                resultDiv.innerHTML = `✅ Found: <b>${found.title}</b> (Vols: ${found.volumes.join(", ")})`;
                resultDiv.style.color = "#27ae60";
            } else {
                resultDiv.innerHTML = `❌ Not found.`;
                resultDiv.style.color = "#e74c3c";
            }
        }

        // เริ่มโหลดข้อมูลทันทีที่เปิดหน้าเว็บ
        fetchAllBooks();
    </script>
</body>
</html>
