<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Shelf</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="login-overlay" class="auth-overlay">
        <div class="login-card">
            <h2>🔐 Private Access</h2>
            <p>กรุณาเข้าสู่ระบบเพื่อดูชั้นหนังสือ</p>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button onclick="handleLogin()" id="login-btn">Sign In</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="top-nav">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 ค้นหาชื่อเรื่อง..." oninput="searchBook()">
                <div id="search-result" class="search-status"></div>
            </div>
            <button onclick="handleLogout()" class="logout-btn-top">Logout</button>
        </div>

        <div class="main-wrapper">
            <div class="sidebar">
                <h2>MENU</h2>
                <button onclick="fetchAllBooks()">🏠 All Series</button>
                <button onclick="filterBooks('Comic')">📖 Comic</button>
                <button onclick="filterBooks('Novel')">📕 Novel</button>
                <button onclick="filterBooks('EBook')">📱 E-Book</button>
                
                <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
                
                <div class="admin-panel">
                    <h3>➕ Add New Book</h3>
                    <input type="text" id="new-title" placeholder="ชื่อเรื่อง">
                    <input type="text" id="new-vol" placeholder="เล่มที่">
                    <select id="new-category">
                        <option value="Comic">Comic</option>
                        <option value="Novel">Novel</option>
                        <option value="EBook">EBook</option>
                    </select>
                    <button onclick="addBook()" id="save-btn">Save to Cloud</button>
                </div>
            </div>

            <div class="content">
                <div id="back-btn" class="back-link" onclick="fetchAllBooks()">⬅ Back to List</div>
                <div id="list-title"><h3>Your Collection</h3></div>
                <div id="book-list">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iesaxrdexywsegppjbxo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9Rxgo8i46-CxS5-vRHmIUQ_fiqTQn1T';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myLibrary = [];
        let currentDisplayData = [];

        // --- ระบบ Authentication ---
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                fetchAllBooks(); // โหลดข้อมูลเฉพาะเมื่อ Login แล้วเท่านั้น
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerText = "Checking...";
            const { error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("เข้าสู่ระบบไม่สำเร็จ: " + error.message);
                btn.innerText = "Sign In";
            } else {
                checkUser();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            checkUser();
        }

        // --- ระบบจัดการข้อมูล (เหมือนเดิมแต่ย้ายมาทำงานหลัง Login) ---
        async function fetchAllBooks() {
            const { data, error } = await _supabase.from('books').select('*').order('title', { ascending: true });
            if (!error) {
                myLibrary = data;
                displayLibrary(myLibrary);
            }
        }

        function displayLibrary(data) {
            currentDisplayData = data;
            const listDiv = document.getElementById('book-list');
            document.getElementById('back-btn').style.display = 'none';
            let html = '<div class="grid-container">';
            data.forEach((series, index) => {
                html += `
                    <div class="series-card" onclick="showDetail(${index})">
                        <div class="card-title">${series.title}</div>
                        <div class="card-info">${series.category} | ${series.volumes ? series.volumes.length : 0} Vols</div>
                    </div>`;
            });
            html += '</div>';
            listDiv.innerHTML = html || '<p>ยังไม่มีข้อมูล</p>';
        }

        function showDetail(index) {
            const series = currentDisplayData[index];
            if (!series) return;
            const listDiv = document.getElementById('book-list');
            document.getElementById('back-btn').style.display = 'block';
            let html = `<div class="detail-view">
                <p>Category: <b>${series.category}</b></p>
                <div class="vol-grid">`;
            const sortedVols = [...series.volumes].sort((a, b) => parseFloat(a) - parseFloat(b));
            sortedVols.forEach(v => { html += `<span class="vol-tag">เล่มที่ ${v}</span>`; });
            html += `</div><button onclick="deleteSeries(${series.id})" class="del-btn">ลบทั้งชุด</button></div>`;
            listDiv.innerHTML = html;
        }

        async function addBook() {
            const title = document.getElementById('new-title').value.trim();
            const vol = document.getElementById('new-vol').value.trim();
            const category = document.getElementById('new-category').value;
            if (!title || !vol) return;

            let existing = myLibrary.find(s => s.title.toLowerCase() === title.toLowerCase());
            if (existing) {
                if (!existing.volumes.includes(vol)) {
                    await _supabase.from('books').update({ volumes: [...existing.volumes, vol] }).eq('id', existing.id);
                }
            } else {
                await _supabase.from('books').insert([{ title, category, volumes: [vol] }]);
            }
            document.getElementById('new-title').value = '';
            document.getElementById('new-vol').value = '';
            fetchAllBooks();
        }

        async function deleteSeries(id) {
            if(confirm("ลบข้อมูลออกจาก Cloud?")) {
                await _supabase.from('books').delete().eq('id', id);
                fetchAllBooks();
            }
        }

        function filterBooks(cat) {
            displayLibrary(myLibrary.filter(s => s.category === cat));
        }

        function searchBook() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const found = myLibrary.find(s => s.title.toLowerCase().includes(query));
            const res = document.getElementById('search-result');
            res.innerHTML = found ? `✅ มีเรื่องนี้: ${found.title}` : `❌ ไม่มีเรื่องนี้`;
        }

        checkUser();
    </script>
</body>
</html>
